---
- name: Remove AllowUsers entry and restart sshd
  hosts: targets
  gather_facts: false

  vars:
    sshd_config_path: /etc/ssh/sshd_config
    # ลบทั้งแบบปกติและแบบมี # คอมเมนต์นำหน้า
    allowusers_regex: '^\s*#?\s*AllowUsers\s+\*@10\.253\.136\.0/24\s*$'

  remote_user: mars
  become: true
  become_method: sudo
  become_user: root

  tasks:
    - name: Remove AllowUsers *@10.253.136.0/24 line from sshd_config
      ansible.builtin.lineinfile:
        path: "{{ sshd_config_path }}"
        state: absent
        regexp: "{{ allowusers_regex }}"
        backup: true
      notify: Restart sshd

    - name: Validate sshd_config syntax (fails fast if broken)
      ansible.builtin.command: sshd -t -f "{{ sshd_config_path }}"
      changed_when: false

  handlers:
    - name: Restart sshd
      # รองรับทั้ง systemd / service
      ansible.builtin.service:
        name: sshd
        state: restarted
      listen: Restart sshd
