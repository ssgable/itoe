---
- name: Emergency remove AllowUsers via raw ssh loop (AWX)
  hosts: localhost
  gather_facts: false

  vars:
    ssh_user: mars
    ssh_port: 22

    # บรรทัดที่ต้องลบ (ทั้งแบบปกติและแบบมี # นำหน้า)
    allowusers_regex_1: '^[[:space:]]*AllowUsers[[:space:]]+\\*@10\\.253\\.136\\.0/24[[:space:]]*$'
    allowusers_regex_2: '^[[:space:]]*#[[:space:]]*AllowUsers[[:space:]]+\\*@10\\.253\\.136\\.0/24[[:space:]]*$'

    # คำสั่งฝั่ง remote: backup -> remove -> validate -> restart
    remote_cmd: >-
      set -e;
      CFG=/etc/ssh/sshd_config;
      TS=$(date +%Y%m%d%H%M%S);
      sudo -n cp -p "$CFG" "$CFG.bak.$TS";
      sudo -n sed -i
      -e "/{{ allowusers_regex_1 }}/d"
      -e "/{{ allowusers_regex_2 }}/d"
      "$CFG";
      sudo -n sshd -t -f "$CFG";
      (sudo -n systemctl restart sshd || sudo -n service sshd restart);
      echo OK

  tasks:
    # --- Detect project directory (AWX normally uses /runner/project)
    - name: Set project_dir candidates
      ansible.builtin.set_fact:
        project_dir_candidates:
          - "/runner/project"
          - "{{ playbook_dir }}/.."

    - name: Find IP file path from candidates
      ansible.builtin.set_fact:
        ip_file: "{{ item }}/inventories/list_ip.ini"
      when: lookup('ansible.builtin.fileglob', item ~ '/inventories/list_ip.ini', wantlist=True) | length > 0
      loop: "{{ project_dir_candidates }}"

    - name: Fallback to root list_ip.ini if inventories path not found
      ansible.builtin.set_fact:
        ip_file: "{{ item }}/list_ip.ini"
      when:
        - ip_file is not defined
        - lookup('ansible.builtin.fileglob', item ~ '/list_ip.ini', wantlist=True) | length > 0
      loop: "{{ project_dir_candidates }}"

    - name: Fail if IP file not found
      ansible.builtin.fail:
        msg: "IP file not found. Put it at /runner/project/inventories/list_ip.ini or /runner/project/list_ip.ini"
      when: ip_file is not defined

    - name: Read targets from ip_file
      ansible.builtin.set_fact:
        targets: >-
          {{
            lookup('ansible.builtin.file', ip_file).splitlines()
            | map('trim')
            | reject('match', '^(#|;|\\s*$|\\[.*\\])')
            | list
          }}

    - name: Fail if no targets
      ansible.builtin.fail:
        msg: "No IPs found in {{ ip_file }}"
      when: targets | length == 0

    - name: Show ip_file + count
      ansible.builtin.debug:
        msg: "Using ip_file={{ ip_file }} targets={{ targets | length }}"

    - name: Execute change via SSH on each host
      ansible.builtin.command: >
        ssh -o BatchMode=yes
            -o StrictHostKeyChecking=no
            -o ConnectTimeout=8
            -p {{ ssh_port }}
            {{ ssh_user }}@{{ item }}
            "{{ remote_cmd }}"
      register: run_out
      changed_when: "'OK' in run_out.stdout"
      loop: "{{ targets }}"

    - name: Print failed hosts (if any)
      ansible.builtin.debug:
        msg: "FAILED: {{ item.item }} => rc={{ item.rc }} stderr={{ item.stderr | default('') }}"
      when: item.rc != 0
      loop: "{{ run_out.results | default([]) }}"
