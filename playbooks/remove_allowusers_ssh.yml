---
- name: Emergency remove AllowUsers via raw ssh loop (AWX-friendly)
  hosts: localhost
  gather_facts: false

  vars:
    # 1) prefer root repo: /runner/project/list_ip.ini
    ip_file_primary: "{{ lookup('env','AWX_PROJECT_DIR') }}/list_ip.ini"
    # 2) fallback: /runner/project/inventories/list_ip.ini
    ip_file_fallback: "{{ lookup('env','AWX_PROJECT_DIR') }}/inventories/list_ip.ini"

    ssh_user: mars
    ssh_port: 22

    # บรรทัดที่ต้องลบ (ทั้งแบบมี # นำหน้า)
    allow_line: "AllowUsers *@10.253.136.0/24"

    # คำสั่งฝั่ง remote (ทำแบบ atomic: backup -> remove -> validate -> restart)
    remote_cmd: >-
      set -e;
      CFG=/etc/ssh/sshd_config;
      TS=$(date +%Y%m%d%H%M%S);
      sudo -n cp -p "$CFG" "$CFG.bak.$TS";
      sudo -n sed -i
      -e '/^[[:space:]]*AllowUsers[[:space:]]+\*@10\.253\.136\.0\/24[[:space:]]*$/d'
      -e '/^[[:space:]]*#[[:space:]]*AllowUsers[[:space:]]+\*@10\.253\.136\.0\/24[[:space:]]*$/d'
      "$CFG";
      sudo -n sshd -t -f "$CFG";
      (sudo -n systemctl restart sshd || sudo -n service sshd restart);
      echo OK

  tasks:
    - name: Pick IP file that exists
      ansible.builtin.set_fact:
        ip_file: "{{ ip_file_primary }}"
      when: lookup('ansible.builtin.fileglob', ip_file_primary, wantlist=True) | length > 0

    - name: Use fallback IP file if primary not found
      ansible.builtin.set_fact:
        ip_file: "{{ ip_file_fallback }}"
      when: ip_file is not defined

    - name: Fail if IP file not found
      ansible.builtin.fail:
        msg: "IP file not found. Looked for: {{ ip_file_primary }} and {{ ip_file_fallback }}"
      when: ip_file is not defined

    - name: Read targets
      ansible.builtin.set_fact:
        targets: >-
          {{
            lookup('ansible.builtin.file', ip_file).splitlines()
            | map('trim')
            | reject('match', '^(#|;|\\s*$|\\[.*\\])')
            | list
          }}

    - name: Fail if no targets
      ansible.builtin.fail:
        msg: "No IPs found in {{ ip_file }}"
      when: targets | length == 0

    - name: Execute change via SSH on each host
      ansible.builtin.command: >
        ssh -o BatchMode=yes
            -o StrictHostKeyChecking=no
            -o ConnectTimeout=8
            -p {{ ssh_port }}
            {{ ssh_user }}@{{ item }}
            "{{ remote_cmd }}"
      register: run_out
      changed_when: "'OK' in run_out.stdout"
      failed_when: run_out.rc != 0
      loop: "{{ targets }}"

    - name: Summary
      ansible.builtin.debug:
        msg: |
          Done. Targets={{ targets|length }}
          Last stdout={{ run_out.results[-1].stdout | default('') }}
